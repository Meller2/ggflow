name: Feature request
description: Idea that improves the first-run path or day-to-day use.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is hard or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: priority_feel
    attributes:
      label: How important for first-run reliability?
      options:
        - Critical (blocks first use)
        - Helpful
        - Nice to have
  - type: textarea
    id: alt
    attributes:
      label: Alternatives considered
